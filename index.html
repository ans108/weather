<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="icon" type="https://cdn-icons-png.flaticon.com/128/1163/1163661.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      min-height: 100vh; color: #e2e8f0; overflow-x: hidden; position: relative;
    }

    #weather-fx {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .sun-glow {
      position: fixed; top: -120px; right: -80px; width: 400px; height: 400px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      background: radial-gradient(circle, rgba(250,204,21,0.18) 0%, rgba(250,204,21,0.06) 40%, transparent 70%);
      opacity: 0; transition: opacity 1.5s ease;
    }
    .sun-glow.active { opacity: 1; animation: sunPulse 4s ease-in-out infinite; }
    @keyframes sunPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.15);opacity:0.8;} }

    .lightning-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0); pointer-events: none; z-index: 0; transition: background 0.05s;
    }
    .lightning-overlay.flash { background: rgba(200,220,255,0.15); }

    .aurora {
      position: fixed; top: -40%; left: -10%; width: 120%; height: 60%;
      background: radial-gradient(ellipse at 30% 50%, rgba(56,189,248,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(139,92,246,0.07) 0%, transparent 60%);
      filter: blur(60px); z-index: 0; pointer-events: none;
      animation: auroraShift 12s ease-in-out infinite alternate;
    }
    @keyframes auroraShift { 0%{transform:translateX(-5%) scale(1);opacity:0.7;} 100%{transform:translateX(5%) scale(1.1);opacity:1;} }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0; margin-bottom: 40px;
    }
    .logo { display: flex; align-items: center; gap: 12px; font-size: 1.5rem; font-weight: 700; color: #60a5fa; }
    .logo-icon { font-size: 2rem; animation: logoPulse 3s ease-in-out infinite; }
    @keyframes logoPulse { 0%,100%{transform:scale(1);filter:drop-shadow(0 0 4px rgba(96,165,250,.4));} 50%{transform:scale(1.12);filter:drop-shadow(0 0 12px rgba(96,165,250,.8));} }

    .controls { display: flex; gap: 10px; align-items: center; }
    .btn {
      background: rgba(15,23,42,0.85); border: 1px solid rgba(71,85,105,0.45);
      color: #e2e8f0; padding: 10px 20px; border-radius: 50px; font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all 0.3s ease; font-weight: 500; font-family: inherit;
    }
    .btn:hover { background: rgba(30,41,59,0.95); border-color: rgba(96,165,250,0.5); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(96,165,250,0.12); }
    .btn svg { width: 16px; height: 16px; fill: none; stroke: #60a5fa; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-icon {
      background: rgba(15,23,42,0.85); border: 1px solid rgba(71,85,105,0.45);
      color: #e2e8f0; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease; font-family: inherit; padding: 0;
    }
    .btn-icon:hover { background: rgba(30,41,59,0.95); border-color: rgba(96,165,250,0.5); transform: translateY(-1px); }
    .btn-icon svg { width: 18px; height: 18px; fill: none; stroke: #94a3b8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-icon:hover svg { stroke: #60a5fa; }
    .refresh-spin { animation: refreshSpin 0.8s ease; }
    @keyframes refreshSpin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

    .country-selector { position: relative; }
    .country-btn {
      background: rgba(15,23,42,0.85); border: 1px solid rgba(71,85,105,0.45);
      color: #e2e8f0; padding: 10px 16px; border-radius: 50px; font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      min-width: 220px; transition: all 0.3s ease; font-family: inherit;
    }
    .country-btn:hover { background: rgba(30,41,59,0.95); border-color: rgba(96,165,250,0.5); }

    .country-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px;
      background: rgba(15,23,42,0.97); border: 1px solid rgba(71,85,105,0.5);
      border-radius: 12px; max-height: 460px; overflow-y: auto; z-index: 1000;
      display: none; backdrop-filter: blur(16px); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      scrollbar-width: thin; scrollbar-color: rgba(96,165,250,0.3) transparent;
    }
    .country-dropdown.show { display: block; animation: dropIn 0.3s ease; }
    @keyframes dropIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }
    .dropdown-search { position: sticky; top: 0; padding: 10px; background: rgba(15,23,42,0.98); border-bottom: 1px solid rgba(71,85,105,0.3); z-index: 2; }
    .dropdown-search input { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(71,85,105,0.4); background: rgba(30,41,59,0.8); color: #e2e8f0; font-size: 0.9rem; font-family: inherit; outline: none; }
    .dropdown-search input:focus { border-color: rgba(96,165,250,0.6); }
    .dropdown-search input::placeholder { color: #64748b; }
    .country-group-label { padding: 10px 16px 6px; font-size: 0.75rem; font-weight: 600; color: #60a5fa; text-transform: uppercase; letter-spacing: 1.5px; background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(71,85,105,0.2); }
    .country-option { padding: 10px 16px 10px 28px; cursor: pointer; transition: all 0.2s; border-bottom: 1px solid rgba(71,85,105,0.15); font-size: 0.92rem; display: flex; align-items: center; gap: 8px; }
    .country-option:hover { background: rgba(59,130,246,0.15); }
    .country-option .city-tag { font-size: 0.75rem; color: #64748b; margin-left: auto; background: rgba(71,85,105,0.25); padding: 2px 8px; border-radius: 4px; }

    .main-content { text-align: center; padding: 60px 20px; }
    .earth-globe { width: 280px; height: 280px; margin: 0 auto 40px; position: relative; animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(-20px);} }
    .globe-inner { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #60a5fa, #3b82f6, #2563eb, #1e40af); box-shadow: 0 0 60px rgba(59,130,246,0.4), inset -30px -30px 60px rgba(0,0,0,0.3), inset 30px 30px 40px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
    .globe-inner::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-linear-gradient(0deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 40px); animation: rotate 20s linear infinite; }
    @keyframes rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .globe-highlight { position: absolute; top: 15%; right: 15%; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.4), transparent); }
    .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 320px; height: 320px; border: 1px solid rgba(96,165,250,0.2); border-radius: 50%; }
    .satellite { position: absolute; width: 12px; height: 12px; background: #60a5fa; border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px rgba(96,165,250,0.8); animation: orbitAnim 8s linear infinite; }
    @keyframes orbitAnim { from{transform:translateX(-50%) rotate(0deg) translateX(160px) rotate(0deg);} to{transform:translateX(-50%) rotate(360deg) translateX(160px) rotate(-360deg);} }
    .prompt-text { font-size: 1.25rem; color: #94a3b8; margin-top: 40px; }

    .weather-display { max-width: 1200px; margin: 0 auto; display: none; }
    .weather-display.show { display: block; animation: fadeSlideUp 0.6s ease; }
    @keyframes fadeSlideUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

    .location-header { text-align: center; margin-bottom: 40px; }
    .location-name { font-size: 2.5rem; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
    .location-country { font-size: 1.25rem; color: #94a3b8; }

    .current-weather { background: rgba(30,41,59,0.45); border: 1px solid rgba(71,85,105,0.4); border-radius: 20px; padding: 40px; margin-bottom: 30px; backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05); }
    .temp-main { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 30px; }

    .weather-icon {
      width: 96px; height: 96px; flex-shrink: 0;
      animation: iconBounce 2s ease-in-out infinite;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.3));
    }
    .weather-icon svg { width: 100%; height: 100%; display: block; }
    @keyframes iconBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

    .temp-value { font-size: 5rem; font-weight: 700; color: #60a5fa; }
    .weather-description { font-size: 1.5rem; color: #94a3b8; text-transform: capitalize; margin-bottom: 30px; }
    .weather-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-top: 30px; padding-top: 30px; border-top: 1px solid rgba(71,85,105,0.3); }
    .detail-item { text-align: center; padding: 16px; border-radius: 12px; background: rgba(30,41,59,0.4); border: 1px solid rgba(71,85,105,0.2); transition: all 0.3s ease; }
    .detail-item:hover { transform: translateY(-4px); border-color: rgba(96,165,250,0.4); box-shadow: 0 8px 24px rgba(96,165,250,0.1); }
    .detail-label { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .detail-value { font-size: 1.8rem; font-weight: 600; color: #e2e8f0; }

    .forecast-section { margin-top: 40px; }
    .forecast-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; }
    .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 16px; }
    .forecast-card { background: rgba(30,41,59,0.45); border: 1px solid rgba(71,85,105,0.4); border-radius: 16px; padding: 20px; text-align: center; transition: all 0.3s ease; backdrop-filter: blur(10px); animation: cardIn 0.5s ease backwards; }
    .forecast-card:nth-child(1){animation-delay:.05s}.forecast-card:nth-child(2){animation-delay:.1s}
    .forecast-card:nth-child(3){animation-delay:.15s}.forecast-card:nth-child(4){animation-delay:.2s}
    .forecast-card:nth-child(5){animation-delay:.25s}.forecast-card:nth-child(6){animation-delay:.3s}
    .forecast-card:nth-child(7){animation-delay:.35s}
    @keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
    .forecast-card:hover { background: rgba(51,65,85,0.6); transform: translateY(-6px); border-color: rgba(96,165,250,0.5); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
    .forecast-date { font-size: 0.95rem; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }

    .forecast-icon {
      width: 52px; height: 52px; margin: 8px auto;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
    }
    .forecast-icon svg { width: 100%; height: 100%; display: block; }

    .temp-range { display: flex; justify-content: center; gap: 8px; margin-top: 8px; font-size: 0.9rem; }
    .temp-high { color: #f87171; }
    .temp-low  { color: #60a5fa; }

    .loading { text-align: center; padding: 60px; }
    .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(71,85,105,0.3); border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to{transform:rotate(360deg);} }
    .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 600px; text-align: center; color: #fca5a5; }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; gap: 14px; margin-bottom: 24px; padding: 12px 0; }
      .controls { flex-direction: row; flex-wrap: wrap; width: 100%; justify-content: center; gap: 8px; }
      .country-selector { width: 100%; }
      .country-btn { width: 100%; justify-content: center; }
      .btn { padding: 9px 16px; font-size: 0.85rem; }
      .btn-icon { width: 38px; height: 38px; }
      .location-name { font-size: 1.7rem; }
      .location-country { font-size: 1rem; }
      .current-weather { padding: 24px 16px; border-radius: 16px; }
      .temp-main { gap: 16px; margin-bottom: 16px; }
      .temp-value { font-size: 3.2rem; }
      .weather-icon { width: 72px; height: 72px; }
      .weather-description { font-size: 1.15rem; margin-bottom: 16px; }
      .weather-details { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; margin-top: 16px; padding-top: 16px; }
      .detail-item { padding: 12px 8px; }
      .detail-label { font-size: 0.7rem; margin-bottom: 4px; }
      .detail-value { font-size: 1.3rem; }
      .forecast-grid { grid-template-columns: repeat(7, minmax(110px,1fr)); overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; gap: 10px; padding-bottom: 8px; }
      .forecast-card { scroll-snap-align: start; min-width: 110px; padding: 14px 10px; border-radius: 12px; }
      .forecast-icon { width: 40px; height: 40px; }
      .forecast-date { font-size: 0.82rem; }
      .temp-range { font-size: 0.8rem; }
      .earth-globe { width: 200px; height: 200px; margin-bottom: 24px; }
      .orbit { width: 240px; height: 240px; }
      .main-content { padding: 30px 10px; }
    }
  </style>
</head>
<body>
  <canvas id="weather-fx"></canvas>
  <div class="aurora"></div>
  <div class="sun-glow" id="sunGlow"></div>
  <div class="lightning-overlay" id="lightningOverlay"></div>

  <div class="container">
    <div class="header">
      <div class="logo">
        <span class="logo-icon">&#9729;&#65039;</span>
        <span>Weather</span>
      </div>
      <div class="controls">
        <div class="country-selector">
          <button class="country-btn" id="countryBtn">
            <span>&#128205;</span>
            <span id="selectedCountryText">Select location</span>
            <span>&#9660;</span>
          </button>
          <div class="country-dropdown" id="countryDropdown"></div>
        </div>
        <button class="btn" id="locateBtn">
          <svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
          <span>Locate me</span>
        </button>
        <button class="btn" id="unitToggle">
          <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
          <span id="unitText">&deg;C</span>
        </button>
        <button class="btn-icon" id="refreshBtn" title="Refresh">
          <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <div id="loading" class="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <p style="color:#94a3b8;font-size:1.1rem;">Loading weather data...</p>
    </div>
    <div id="error" class="error" style="display:none;"></div>

    <div id="initialView" class="main-content">
      <div class="earth-globe">
        <div class="orbit"><div class="satellite"></div></div>
        <div class="globe-inner"><div class="globe-highlight"></div></div>
      </div>
      <p class="prompt-text">Use your location or select a country to see the weather</p>
    </div>

    <div id="weatherDisplay" class="weather-display"></div>
  </div>

  <script>
    // =============================================
    //  SVG WEATHER ICON SYSTEM
    // =============================================
    let _uid = 0;

    // Cloud path reused across icons
    const CP = "M10,46 Q7,46 5,42 Q3,38 7,36 Q7,29 14,28 Q16,21 24,21 Q30,21 33,26 Q37,20 44,22 Q51,22 53,27 Q57,27 59,32 Q61,37 57,40 Q55,45 51,46Z";
    // Smaller cloud for combo icons (sun/moon + cloud)
    const SCP = "M14,52 Q11,52 9,48 Q7,44 11,42 Q11,36 17,35 Q19,30 25,30 Q30,30 33,34 Q36,29 42,31 Q47,31 49,36 Q52,36 53,40 Q55,44 52,47 Q50,51 47,52Z";

    function _rays(cx, cy, r1, r2, n, sw) {
      let s = '';
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 / n) * i - Math.PI / 2;
        s += `<line x1="${(cx+Math.cos(a)*r1).toFixed(1)}" y1="${(cy+Math.sin(a)*r1).toFixed(1)}" x2="${(cx+Math.cos(a)*r2).toFixed(1)}" y2="${(cy+Math.sin(a)*r2).toFixed(1)}"/>`;
      }
      return `<g stroke="#FFB300" stroke-width="${sw||2.5}" stroke-linecap="round">${s}</g>`;
    }

    function _rain(pts, col) {
      return `<g stroke="${col||'#60A5FA'}" stroke-width="2" stroke-linecap="round">${pts.map(([x,y])=>`<line x1="${x}" y1="${y}" x2="${x-1}" y2="${y+7}"/>`).join('')}</g>`;
    }

    function _snow(pts) {
      return `<g fill="#BFDBFE">${pts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="2.5"/>`).join('')}</g>`;
    }

    function _svg(body) {
      return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
    }

    function _sunGrad(u, cx, cy) {
      return `<defs><radialGradient id="sg${u}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFE566"/><stop offset="100%" stop-color="#FF8C00"/></radialGradient></defs>
        <circle cx="${cx}" cy="${cy}" r="${cx===32?22:14}" fill="#FFD700" fill-opacity="0.1"/>`;
    }

    function _moon(u, cx, cy, r, ox, oy, or2) {
      return `<defs>
        <mask id="mk${u}"><rect width="64" height="64" fill="white"/><circle cx="${ox}" cy="${oy}" r="${or2}" fill="black"/></mask>
        <radialGradient id="mn${u}" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#E0ECFF"/><stop offset="100%" stop-color="#7A94E8"/></radialGradient>
      </defs>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#mn${u})" mask="url(#mk${u})"/>
      <ellipse cx="${cx-r*0.35}" cy="${cy-r*0.35}" rx="${r*0.3}" ry="${r*0.25}" fill="rgba(255,255,255,0.22)" mask="url(#mk${u})"/>`;
    }

    function _stars() {
      return `<circle cx="50" cy="9" r="1.5" fill="#C0D8FF" fill-opacity="0.9"/>
        <circle cx="57" cy="22" r="1" fill="#C0D8FF" fill-opacity="0.7"/>
        <circle cx="53" cy="38" r="1.2" fill="#C0D8FF" fill-opacity="0.55"/>
        <circle cx="11" cy="14" r="1" fill="#C0D8FF" fill-opacity="0.45"/>`;
    }

    function getWeatherIcon(code, isDay) {
      const u = ++_uid;
      const day = isDay !== false; // default true for forecasts

      // 0-1: Clear sky
      if (code <= 1) {
        if (day) {
          return _svg(`
            ${_sunGrad(u,32,32)}
            ${_rays(32,32,16,24,8,2.5)}
            <circle cx="32" cy="32" r="13" fill="url(#sg${u})"/>
            <ellipse cx="26" cy="26" rx="5" ry="4" fill="rgba(255,255,255,0.35)"/>
          `);
        } else {
          return _svg(`
            ${_stars()}
            ${_moon(u,28,32,20,40,26,18)}
          `);
        }
      }

      // 2: Partly cloudy
      if (code === 2) {
        const cf = day ? '#EEF2FF' : '#8899BB';
        const cloud = `<path d="${SCP}" fill="${cf}"/><ellipse cx="24" cy="40" rx="5" ry="3.5" fill="rgba(255,255,255,${day?'0.18':'0.08'})"/>`;
        if (day) {
          return _svg(`
            ${_sunGrad(u,16,16)}
            ${_rays(16,16,12,18,8,2)}
            <circle cx="16" cy="16" r="10" fill="url(#sg${u})"/>
            <ellipse cx="12" cy="12" rx="3.5" ry="3" fill="rgba(255,255,255,0.35)"/>
            ${cloud}
          `);
        } else {
          return _svg(`
            ${_stars()}
            ${_moon(u,14,14,13,24,8,12)}
            ${cloud}
          `);
        }
      }

      // 3: Overcast
      if (code === 3) {
        return _svg(`
          <path d="${CP}" fill="#94A3B8"/>
          <ellipse cx="26" cy="32" rx="8" ry="4.5" fill="rgba(255,255,255,0.1)"/>
        `);
      }

      // 45-48: Fog
      if (code <= 48) {
        return _svg(`
          <rect x="4" y="20" width="56" height="7" rx="3.5" fill="#94A3B8" fill-opacity="0.75"/>
          <rect x="10" y="31" width="44" height="7" rx="3.5" fill="#94A3B8" fill-opacity="0.55"/>
          <rect x="6" y="42" width="52" height="7" rx="3.5" fill="#94A3B8" fill-opacity="0.38"/>
        `);
      }

      // 51-55: Drizzle
      if (code <= 55) {
        return _svg(`
          <path d="${CP}" fill="#78909C"/>

        const fc = cities.filter(c => !lf || country.toLowerCase().includes(lf) || c.city.toLowerCase().includes(lf));

    // =============================================

    // =============================================
    document.getElementById('locateBtn').onclick = () => {
      if (!navigator.geolocation) return showError('Geolocation is not supported by your browser.');
      showLoading();

      navigator.geolocation.getCurrentPosition(
        async pos => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;

          // 1) Start weather fetch immediately — no waiting for geocoding
          fetchWeather(lat, lon, 'My Location', '');

          // 2) Geocode in background (3 s max)
          try {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), 3000);
            const r = await fetch(
              `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`,
              { signal: ctrl.signal }
            );
            clearTimeout(tid);
            if (r.ok) {
              const d = await r.json();
              const city    = d.city || d.locality || d.principalSubdivision || 'My Location';
              const country = d.countryName || '';
              // Update location info if weather display is already shown
              if (currentLocation) currentLocation.city = city, currentLocation.country = country;
              const nameEl    = document.querySelector('.location-name');
              const cntryEl   = document.querySelector('.location-country');
              if (nameEl)  nameEl.textContent  = city;
              if (cntryEl) cntryEl.textContent = country;
              document.getElementById('selectedCountryText').textContent = `${city}${country ? ', '+country : ''}`;
            }
          } catch (_) { /* silently ignore geocoding failure */ }
        },
        err => {
          hideLoading();
          const msgs = { 1: 'Location access denied. Please allow location in browser settings, or pick a location manually.', 2: 'Location unavailable. Check GPS/network, or select a location manually.', 3: 'Location timed out. Check connection, or select a location manually.' };
          showError(msgs[err.code] || 'Failed to get location. Please try again.');
        },
        { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 }
      );
    };

    // =============================================
    //  FETCH WEATHER — adds is_day to current params
    // =============================================
    async function fetchWeather(lat, lon, city, country) {
      showLoading();
      currentLocation = { lat, lon, city, country };
      try {
        const tu  = currentUnit === 'celsius' ? 'celsius' : 'fahrenheit';
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&temperature_unit=${tu}&wind_speed_unit=kmh&timezone=auto`;
        const res  = await fetch(url);
        const data = await res.json();
        displayWeather(data, city, country);
        hideLoading();
      } catch (e) {
        hideLoading();
        showError('Failed to fetch weather data. Please check your connection and try again.');
      }
    }

    // =============================================
    //  DISPLAY WEATHER
    // =============================================
    function displayWeather(data, city, country) {
      const c    = data.current;
      const d    = data.daily;
      const unit = currentUnit === 'celsius' ? '°C' : '°F';
      const isDay = c.is_day === 1;
      const iconSvg = getWeatherIcon(c.weather_code, isDay);
      const desc    = WEATHER_DESCRIPTIONS[c.weather_code] || 'Unknown';
      const precip  = c.precipitation !== undefined ? c.precipitation : 0;

      document.getElementById('weatherDisplay').innerHTML = `
        <div class="location-header">
          <h1 class="location-name">${city}</h1>
          <p class="location-country">${country}</p>
        </div>
        <div class="current-weather">
          <div class="temp-main">
            <div class="weather-icon">${iconSvg}</div>
            <div class="temp-value">${Math.round(c.temperature_2m)}${unit}</div>
          </div>
          <div class="weather-description">${desc}</div>
          <div class="weather-details">
            <div class="detail-item"><div class="detail-label">Feels Like</div><div class="detail-value">${Math.round(c.apparent_temperature)}${unit}</div></div>
            <div class="detail-item"><div class="detail-label">Humidity</div><div class="detail-value">${c.relative_humidity_2m}%</div></div>
            <div class="detail-item"><div class="detail-label">Wind Speed</div><div class="detail-value">${Math.round(c.wind_speed_10m)} km/h</div></div>
            <div class="detail-item"><div class="detail-label">Precipitation</div><div class="detail-value">${precip} mm</div></div>
          </div>
        </div>
        <div class="forecast-section">
          <h2 class="forecast-title">7-Day Forecast</h2>
          <div class="forecast-grid">
            ${d.time.slice(0,7).map((date,i) => {
              const fi  = getWeatherIcon(d.weather_code[i], true); // daytime for forecast
              const dn  = new Date(date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
              const dp  = d.precipitation_sum ? d.precipitation_sum[i] : 0;
              return `<div class="forecast-card">
                <div class="forecast-date">${dn}</div>
                <div class="forecast-icon">${fi}</div>
                <div class="temp-range">
                  <span class="temp-high">${Math.round(d.temperature_2m_max[i])}${unit}</span>
                  <span>/</span>
                  <span class="temp-low">${Math.round(d.temperature_2m_min[i])}${unit}</span>
                </div>
                <div style="font-size:0.8rem;color:#64748b;margin-top:6px;">💧 ${dp} mm</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;

      document.getElementById('initialView').style.display = 'none';
      document.getElementById('weatherDisplay').classList.add('show');
      startWeatherFX(c.weather_code, isDay);
    }

    // =============================================
    //  WEATHER FX — lightweight canvas effects
    // =============================================
    (function() {
      const fx  = document.getElementById('weather-fx');
      const ctx = fx.getContext('2d');
      let FW, FH, pts = [], raf = null, ltI = null;

      function resize() { FW = fx.width = innerWidth; FH = fx.height = innerHeight; }
      window.addEventListener('resize', resize);
      resize();

      // Reduced particle counts vs original for performance
      function createRain(n) {
        const p = [];
        for (let i = 0; i < n; i++) p.push({ x:Math.random()*FW, y:Math.random()*FH, len:Math.random()*14+8, spd:Math.random()*5+7, o:Math.random()*0.3+0.12, w:Math.random()*1+0.5 });
        return p;
      }
      function drawRain() {
        ctx.clearRect(0,0,FW,FH);
        pts.forEach(p => {
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+1,p.y+p.len);
          ctx.strokeStyle = `rgba(130,180,255,${p.o})`; ctx.lineWidth = p.w; ctx.stroke();
          p.y += p.spd; p.x += 0.5;
          if (p.y > FH) { p.y = -p.len; p.x = Math.random()*FW; }
        });
        raf = requestAnimationFrame(drawRain);
      }

      function createSnow(n) {
        const p = [];
        for (let i = 0; i < n; i++) p.push({ x:Math.random()*FW, y:Math.random()*FH, r:Math.random()*2.5+1, spd:Math.random()*1.2+0.4, drift:Math.random()*0.8-0.4, o:Math.random()*0.5+0.25, wb:Math.random()*Math.PI*2 });
        return p;
      }
      function drawSnow() {
        ctx.clearRect(0,0,FW,FH);
        pts.forEach(p => {
          p.wb += 0.01;
          ctx.beginPath(); ctx.arc(p.x+Math.sin(p.wb)*25, p.y, p.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(220,235,255,${p.o})`; ctx.fill();
          p.y += p.spd; p.x += p.drift;
          if (p.y > FH+8) { p.y = -8; p.x = Math.random()*FW; }
        });
        raf = requestAnimationFrame(drawSnow);
      }

      function startLt() {
        const o = document.getElementById('lightningOverlay');
        ltI = setInterval(() => {
          if (Math.random() > 0.6) {
            o.classList.add('flash');
            setTimeout(() => o.classList.remove('flash'), 80);
            setTimeout(() => { o.classList.add('flash'); setTimeout(() => o.classList.remove('flash'), 60); }, 160);
          }
        }, 3000);
      }
      function stopLt() {
        if (ltI) { clearInterval(ltI); ltI = null; }
        document.getElementById('lightningOverlay').classList.remove('flash');
      }

      window.startWeatherFX = function(code, isDay) {
        if (raf) cancelAnimationFrame(raf);
        ctx.clearRect(0,0,FW,FH);
        pts = []; stopLt();
        document.getElementById('sunGlow').classList.toggle('active', !!(isDay && code <= 1));

        if ([51,53,55,61,63,65,80,81,82].includes(code))  { pts = createRain(code>=63?120:60); drawRain(); }
        else if ([71,73,75,77,85,86].includes(code))        { pts = createSnow(code>=75?80:45); drawSnow(); }
        else if ([95,96,99].includes(code))                  { pts = createRain(130); drawRain(); startLt(); }
      };
    })();
  </script>
</body>
</html>

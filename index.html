<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      min-height: 100vh;
      color: #e2e8f0;
      padding: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Particle Background ── */
    #particles-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Weather Effects Canvas ── */
    #weather-fx {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Sun glow overlay ── */
    .sun-glow {
      position: fixed; top: -120px; right: -80px; width: 400px; height: 400px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      background: radial-gradient(circle, rgba(250,204,21,0.18) 0%, rgba(250,204,21,0.06) 40%, transparent 70%);
      opacity: 0; transition: opacity 1.5s ease;
    }
    .sun-glow.active { opacity: 1; animation: sunPulse 4s ease-in-out infinite; }
    @keyframes sunPulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%     { transform: scale(1.15); opacity: 0.8; }
    }

    /* ── Lightning flash ── */
    .lightning-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0); pointer-events: none; z-index: 0;
      transition: background 0.05s;
    }
    .lightning-overlay.flash { background: rgba(200,220,255,0.15); }

    /* ── Aurora Glow ── */
    .aurora {
      position: fixed; top: -40%; left: -10%; width: 120%; height: 60%;
      background: radial-gradient(ellipse at 30% 50%, rgba(56,189,248,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(139,92,246,0.07) 0%, transparent 60%);
      filter: blur(60px); z-index: 0; pointer-events: none;
      animation: auroraShift 12s ease-in-out infinite alternate;
    }
    @keyframes auroraShift {
      0%   { transform: translateX(-5%) scale(1); opacity: 0.7; }
      100% { transform: translateX(5%) scale(1.1); opacity: 1; }
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0; margin-bottom: 40px;
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      font-size: 1.5rem; font-weight: 700; color: #60a5fa;
    }
    .logo-icon { font-size: 2rem; animation: logoPulse 3s ease-in-out infinite; }
    @keyframes logoPulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(96,165,250,0.4)); }
      50%     { transform: scale(1.12); filter: drop-shadow(0 0 12px rgba(96,165,250,0.8)); }
    }

    .controls { display: flex; gap: 10px; align-items: center; }
    .btn {
      background: rgba(15,23,42,0.85); border: 1px solid rgba(71,85,105,0.45);
      color: #e2e8f0; padding: 10px 20px; border-radius: 50px; font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all 0.3s ease; font-weight: 500; font-family: inherit;
    }
    .btn:hover {
      background: rgba(30,41,59,0.95); border-color: rgba(96,165,250,0.5);
      transform: translateY(-1px); box-shadow: 0 4px 16px rgba(96,165,250,0.12);
    }
    .btn svg { width: 16px; height: 16px; fill: none; stroke: #60a5fa; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-primary { background: rgba(30,41,59,0.9); border-color: rgba(71,85,105,0.5); }
    .btn-primary:hover { background: rgba(40,52,72,0.95); }
    .btn-icon {
      background: rgba(15,23,42,0.85); border: 1px solid rgba(71,85,105,0.45);
      color: #e2e8f0; width: 40px; height: 40px; border-radius: 50%; font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease; font-family: inherit; padding: 0;
    }
    .btn-icon:hover {
      background: rgba(30,41,59,0.95); border-color: rgba(96,165,250,0.5);
      transform: translateY(-1px); box-shadow: 0 4px 16px rgba(96,165,250,0.12);
    }
    .btn-icon svg { width: 18px; height: 18px; fill: none; stroke: #94a3b8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-icon:hover svg { stroke: #60a5fa; }
    .refresh-spin { animation: refreshSpin 0.8s ease; }
    @keyframes refreshSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Country Selector ── */
    .country-selector { position: relative; }
    .country-btn {
      background: rgba(30,41,59,0.8); border: 1px solid rgba(71,85,105,0.5);
      color: #e2e8f0; padding: 10px 16px; border-radius: 8px; font-size: 0.95rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      min-width: 220px; transition: all 0.3s ease; font-family: inherit;
    }
    .country-btn:hover { background: rgba(51,65,85,0.9); border-color: rgba(96,165,250,0.5); }

    .country-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px;
      background: rgba(15,23,42,0.97); border: 1px solid rgba(71,85,105,0.5);
      border-radius: 12px; max-height: 460px; overflow-y: auto; z-index: 1000;
      display: none; backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      scrollbar-width: thin; scrollbar-color: rgba(96,165,250,0.3) transparent;
    }
    .country-dropdown.show { display: block; animation: dropIn 0.3s ease; }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dropdown-search {
      position: sticky; top: 0; padding: 10px; background: rgba(15,23,42,0.98);
      border-bottom: 1px solid rgba(71,85,105,0.3); z-index: 2;
    }
    .dropdown-search input {
      width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(71,85,105,0.4);
      background: rgba(30,41,59,0.8); color: #e2e8f0; font-size: 0.9rem;
      font-family: inherit; outline: none;
    }
    .dropdown-search input:focus { border-color: rgba(96,165,250,0.6); }
    .dropdown-search input::placeholder { color: #64748b; }

    .country-group-label {
      padding: 10px 16px 6px; font-size: 0.75rem; font-weight: 600;
      color: #60a5fa; text-transform: uppercase; letter-spacing: 1.5px;
      background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(71,85,105,0.2);
    }
    .country-option {
      padding: 10px 16px 10px 28px; cursor: pointer;
      transition: all 0.2s; border-bottom: 1px solid rgba(71,85,105,0.15);
      font-size: 0.92rem; display: flex; align-items: center; gap: 8px;
    }
    .country-option:hover { background: rgba(59,130,246,0.15); }
    .country-option .city-tag {
      font-size: 0.75rem; color: #64748b; margin-left: auto;
      background: rgba(71,85,105,0.25); padding: 2px 8px; border-radius: 4px;
    }

    /* ── Globe ── */
    .main-content { text-align: center; padding: 60px 20px; }
    .earth-globe {
      width: 280px; height: 280px; margin: 0 auto 40px;
      position: relative; animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%     { transform: translateY(-20px); }
    }
    .globe-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #3b82f6, #2563eb, #1e40af);
      box-shadow: 0 0 60px rgba(59,130,246,0.4),
        inset -30px -30px 60px rgba(0,0,0,0.3),
        inset 30px 30px 40px rgba(255,255,255,0.1);
      position: relative; overflow: hidden;
    }
    .globe-inner::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: repeating-linear-gradient(0deg, transparent, transparent 20px,
        rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 40px);
      animation: rotate 20s linear infinite;
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .globe-highlight {
      position: absolute; top: 15%; right: 15%; width: 60px; height: 60px;
      border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.4), transparent);
    }
    .orbit {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 320px; height: 320px; border: 1px solid rgba(96,165,250,0.2); border-radius: 50%;
    }
    .satellite {
      position: absolute; width: 12px; height: 12px; background: #60a5fa; border-radius: 50%;
      top: 0; left: 50%; transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(96,165,250,0.8); animation: orbitAnim 8s linear infinite;
    }
    @keyframes orbitAnim {
      from { transform: translateX(-50%) rotate(0deg) translateX(160px) rotate(0deg); }
      to   { transform: translateX(-50%) rotate(360deg) translateX(160px) rotate(-360deg); }
    }
    .prompt-text { font-size: 1.25rem; color: #94a3b8; margin-top: 40px; }

    /* ── Weather Display ── */
    .weather-display { max-width: 1200px; margin: 0 auto; display: none; }
    .weather-display.show { display: block; animation: fadeSlideUp 0.6s ease; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .location-header { text-align: center; margin-bottom: 40px; }
    .location-name { font-size: 2.5rem; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
    .location-country { font-size: 1.25rem; color: #94a3b8; }

    .current-weather {
      background: rgba(30,41,59,0.45); border: 1px solid rgba(71,85,105,0.4);
      border-radius: 20px; padding: 40px; margin-bottom: 30px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .temp-main { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 30px; }
    .weather-icon { font-size: 6rem; animation: iconBounce 2s ease-in-out infinite; }
    @keyframes iconBounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-8px); }
    }
    .temp-value { font-size: 5rem; font-weight: 700; color: #60a5fa; }
    .weather-description { font-size: 1.5rem; color: #94a3b8; text-transform: capitalize; margin-bottom: 30px; }

    .weather-details {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-top: 30px; padding-top: 30px;
      border-top: 1px solid rgba(71,85,105,0.3);
    }
    .detail-item {
      text-align: center; padding: 16px; border-radius: 12px;
      background: rgba(30,41,59,0.4); border: 1px solid rgba(71,85,105,0.2);
      transition: all 0.3s ease;
    }
    .detail-item:hover {
      transform: translateY(-4px); border-color: rgba(96,165,250,0.4);
      box-shadow: 0 8px 24px rgba(96,165,250,0.1);
    }
    .detail-label {
      font-size: 0.85rem; color: #64748b; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .detail-value { font-size: 1.8rem; font-weight: 600; color: #e2e8f0; }

    /* ── Forecast ── */
    .forecast-section { margin-top: 40px; }
    .forecast-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; }
    .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 16px; }
    .forecast-card {
      background: rgba(30,41,59,0.45); border: 1px solid rgba(71,85,105,0.4);
      border-radius: 16px; padding: 20px; text-align: center;
      transition: all 0.3s ease; backdrop-filter: blur(10px);
      animation: cardIn 0.5s ease backwards;
    }
    .forecast-card:nth-child(1) { animation-delay: 0.05s; }
    .forecast-card:nth-child(2) { animation-delay: 0.1s; }
    .forecast-card:nth-child(3) { animation-delay: 0.15s; }
    .forecast-card:nth-child(4) { animation-delay: 0.2s; }
    .forecast-card:nth-child(5) { animation-delay: 0.25s; }
    .forecast-card:nth-child(6) { animation-delay: 0.3s; }
    .forecast-card:nth-child(7) { animation-delay: 0.35s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .forecast-card:hover {
      background: rgba(51,65,85,0.6); transform: translateY(-6px);
      border-color: rgba(96,165,250,0.5); box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }
    .forecast-date { font-size: 0.95rem; color: #94a3b8; margin-bottom: 12px; font-weight: 500; }
    .forecast-icon { font-size: 3rem; margin: 12px 0; }
    .temp-range { display: flex; justify-content: center; gap: 8px; margin-top: 8px; font-size: 0.9rem; }
    .temp-high { color: #f87171; }
    .temp-low  { color: #60a5fa; }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 60px; }
    .loading-spinner {
      width: 60px; height: 60px; border: 4px solid rgba(71,85,105,0.3);
      border-top-color: #60a5fa; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 600px;
      text-align: center; color: #fca5a5;
    }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header { flex-direction: column; gap: 14px; margin-bottom: 24px; padding: 12px 0; }
      .controls { flex-direction: row; flex-wrap: wrap; width: 100%; justify-content: center; gap: 8px; }
      .country-selector { width: 100%; }
      .country-btn { width: 100%; justify-content: center; }
      .btn { padding: 9px 16px; font-size: 0.85rem; }
      .btn-icon { width: 38px; height: 38px; }

      .location-header { margin-bottom: 20px; }
      .location-name { font-size: 1.7rem; }
      .location-country { font-size: 1rem; }

      .current-weather { padding: 24px 16px; border-radius: 16px; }
      .temp-main { gap: 16px; margin-bottom: 16px; }
      .temp-value { font-size: 3.2rem; }
      .weather-icon { font-size: 3.8rem; }
      .weather-description { font-size: 1.15rem; margin-bottom: 16px; }

      .weather-details {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 10px; margin-top: 16px; padding-top: 16px;
      }
      .detail-item { padding: 12px 8px; }
      .detail-label { font-size: 0.7rem; margin-bottom: 4px; letter-spacing: 0.8px; }
      .detail-value { font-size: 1.3rem; }

      .forecast-section { margin-top: 24px; }
      .forecast-title { font-size: 1.2rem; margin-bottom: 14px; }
      .forecast-grid {
        grid-template-columns: repeat(7, minmax(110px, 1fr));
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        scroll-snap-type: x mandatory; gap: 10px;
        padding-bottom: 8px;
      }
      .forecast-card {
        scroll-snap-align: start; min-width: 110px;
        padding: 14px 10px; border-radius: 12px;
      }
      .forecast-icon { font-size: 2.2rem; margin: 8px 0; }
      .forecast-date { font-size: 0.82rem; margin-bottom: 6px; }
      .temp-range { font-size: 0.8rem; }

      .earth-globe { width: 200px; height: 200px; margin-bottom: 24px; }
      .orbit { width: 240px; height: 240px; }
      .prompt-text { font-size: 1.05rem; margin-top: 24px; }
      .main-content { padding: 30px 10px; }
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <canvas id="weather-fx"></canvas>
  <div class="aurora"></div>
  <div class="sun-glow" id="sunGlow"></div>
  <div class="lightning-overlay" id="lightningOverlay"></div>

  <div class="container">
    <div class="header">
      <div class="logo">
        <span class="logo-icon">☁️</span>
        <span>Weather</span>
      </div>
      <div class="controls">
        <div class="country-selector">
          <button class="country-btn" id="countryBtn">
            <span>📍</span>
            <span id="selectedCountryText">Select location</span>
            <span>▼</span>
          </button>
          <div class="country-dropdown" id="countryDropdown"></div>
        </div>
        <button class="btn btn-primary" id="locateBtn">
          <svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
          <span>Locate me</span>
        </button>
        <button class="btn" id="unitToggle">
          <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
          <span id="unitText">°C</span>
        </button>
        <button class="btn-icon" id="refreshBtn" title="Refresh">
          <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <div id="loading" class="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <p style="color:#94a3b8;font-size:1.1rem;">Loading weather data...</p>
    </div>
    <div id="error" class="error" style="display:none;"></div>

    <div id="initialView" class="main-content">
      <div class="earth-globe">
        <div class="orbit"><div class="satellite"></div></div>
        <div class="globe-inner"><div class="globe-highlight"></div></div>
      </div>
      <p class="prompt-text">Use your location or select a country to see the weather</p>
    </div>

    <div id="weatherDisplay" class="weather-display"></div>
  </div>

  <script>
    // ── Particle Animation ──
    (function(){
      const c = document.getElementById('particles-canvas');
      const ctx = c.getContext('2d');
      let W, H, particles = [];
      function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      for(let i = 0; i < 60; i++){
        particles.push({
          x: Math.random()*W, y: Math.random()*H,
          r: Math.random()*2+0.5, dx: (Math.random()-0.5)*0.3, dy: (Math.random()-0.5)*0.3,
          o: Math.random()*0.4+0.1
        });
      }
      function draw(){
        ctx.clearRect(0,0,W,H);
        particles.forEach(p=>{
          p.x += p.dx; p.y += p.dy;
          if(p.x<0) p.x=W; if(p.x>W) p.x=0;
          if(p.y<0) p.y=H; if(p.y>H) p.y=0;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle = `rgba(96,165,250,${p.o})`; ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ── Countries & Cities Data ──
    const COUNTRIES = {
      'Pakistan': [
        { city:'Karachi', lat:24.8607, lon:67.0011 },
        { city:'Lahore', lat:31.5204, lon:74.3587 },
        { city:'Islamabad', lat:33.6844, lon:73.0479 },
        { city:'Peshawar', lat:34.0151, lon:71.5249 },
        { city:'Quetta', lat:30.1798, lon:66.9750 },
        { city:'Faisalabad', lat:31.4504, lon:73.1350 },
        { city:'Kashmir (Muzaffarabad)', lat:34.3700, lon:73.4711 },
      ],
      'India': [
        { city:'Mumbai', lat:19.0760, lon:72.8777 },
        { city:'Delhi', lat:28.7041, lon:77.1025 },
        { city:'Bangalore', lat:12.9716, lon:77.5946 },
        { city:'Chennai', lat:13.0827, lon:80.2707 },
        { city:'Kolkata', lat:22.5726, lon:88.3639 },
        { city:'Hyderabad', lat:17.3850, lon:78.4867 },
      ],
      'United States': [
        { city:'New York', lat:40.7128, lon:-74.0060 },
        { city:'Los Angeles', lat:34.0522, lon:-118.2437 },
        { city:'Chicago', lat:41.8781, lon:-87.6298 },
        { city:'Houston', lat:29.7604, lon:-95.3698 },
        { city:'Miami', lat:25.7617, lon:-80.1918 },
        { city:'San Francisco', lat:37.7749, lon:-122.4194 },
        { city:'Seattle', lat:47.6062, lon:-122.3321 },
      ],
      'United Kingdom': [
        { city:'London', lat:51.5074, lon:-0.1278 },
        { city:'Manchester', lat:53.4808, lon:-2.2426 },
        { city:'Birmingham', lat:52.4862, lon:-1.8904 },
        { city:'Edinburgh', lat:55.9533, lon:-3.1883 },
        { city:'Glasgow', lat:55.8642, lon:-4.2518 },
      ],
      'Canada': [
        { city:'Toronto', lat:43.6532, lon:-79.3832 },
        { city:'Vancouver', lat:49.2827, lon:-123.1207 },
        { city:'Montreal', lat:45.5017, lon:-73.5673 },
        { city:'Calgary', lat:51.0447, lon:-114.0719 },
        { city:'Ottawa', lat:45.4215, lon:-75.6972 },
      ],
      'Australia': [
        { city:'Sydney', lat:-33.8688, lon:151.2093 },
        { city:'Melbourne', lat:-37.8136, lon:144.9631 },
        { city:'Brisbane', lat:-27.4698, lon:153.0251 },
        { city:'Perth', lat:-31.9505, lon:115.8605 },

    const WEATHER_ICONS = {
      0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
      51:'🌦️',53:'🌦️',55:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',
      71:'❄️',73:'❄️',75:'❄️',77:'❄️',80:'🌧️',81:'🌧️',82:'🌧️',
      85:'❄️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'
    };
    const WEATHER_DESCRIPTIONS = {
      0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
      45:'Foggy',48:'Foggy',51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',
      61:'Slight rain',63:'Moderate rain',65:'Heavy rain',
      71:'Slight snow',73:'Moderate snow',75:'Heavy snow',77:'Snow grains',
      80:'Slight rain showers',81:'Moderate rain showers',82:'Violent rain showers',
      85:'Slight snow showers',86:'Heavy snow showers',
      95:'Thunderstorm',96:'Thunderstorm with hail',99:'Thunderstorm with heavy hail'
    };

    let currentUnit = 'celsius';
    let currentLocation = null;

    // ── Build Dropdown ──
    const dropdown = document.getElementById('countryDropdown');
    const searchDiv = document.createElement('div');
    searchDiv.className = 'dropdown-search';
    searchDiv.innerHTML = '<input type="text" id="dropdownSearch" placeholder="Search country or city...">';
    dropdown.appendChild(searchDiv);

    const listContainer = document.createElement('div');
    listContainer.id = 'dropdownList';
    dropdown.appendChild(listContainer);

    function buildDropdown(filter = '') {
      listContainer.innerHTML = '';
      const lf = filter.toLowerCase();
      Object.entries(COUNTRIES).forEach(([country, cities]) => {
        const filteredCities = cities.filter(c =>
          !lf || country.toLowerCase().includes(lf) || c.city.toLowerCase().includes(lf)
        );
        if (filteredCities.length === 0) return;

        const label = document.createElement('div');
        label.className = 'country-group-label';
        label.textContent = country;
        listContainer.appendChild(label);

        filteredCities.forEach(loc => {
          const opt = document.createElement('div');
          opt.className = 'country-option';
          opt.innerHTML = `<span>${loc.city}</span><span class="city-tag">${country}</span>`;
          opt.onclick = () => selectLocation(loc, country);
          listContainer.appendChild(opt);
        });
      });
    }
    buildDropdown();

    document.getElementById('countryBtn').onclick = (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('show');
      if(dropdown.classList.contains('show')){
        setTimeout(()=> document.getElementById('dropdownSearch').focus(), 50);
      }
    };
    dropdown.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('click', () => dropdown.classList.remove('show'));

    document.getElementById('dropdownSearch').addEventListener('input', (e) => {
      buildDropdown(e.target.value);
    });

    // ── Unit Toggle ──
    document.getElementById('unitToggle').onclick = () => {
      currentUnit = currentUnit === 'celsius' ? 'fahrenheit' : 'celsius';
      document.getElementById('unitText').textContent = currentUnit === 'celsius' ? '°C' : '°F';
      if (currentLocation) {
        fetchWeather(currentLocation.lat, currentLocation.lon, currentLocation.city, currentLocation.country);
      }
    };

    // ── Refresh Button ──
    document.getElementById('refreshBtn').onclick = () => {
      if (currentLocation) {
        const svg = document.querySelector('#refreshBtn svg');
        svg.classList.add('refresh-spin');
        setTimeout(() => svg.classList.remove('refresh-spin'), 800);
        fetchWeather(currentLocation.lat, currentLocation.lon, currentLocation.city, currentLocation.country);
      }
    };

    // ── Locate Me ──
    document.getElementById('locateBtn').onclick = () => {
      if (navigator.geolocation) {
        showLoading();
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const { latitude, longitude } = pos.coords;
            try {
              const r = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${latitude}&longitude=${longitude}`);
              const d = await r.json();
              const city = d.results?.[0]?.name || 'Your location';
              const country = d.results?.[0]?.country || '';
              await fetchWeather(latitude, longitude, city, country);
            } catch { showError('Failed to get location details'); }
          },
          () => { hideLoading(); showError('Location access denied. Please select a country manually.'); }
        );
      } else { showError('Geolocation is not supported by your browser'); }
    };

    async function selectLocation(loc, country) {
      dropdown.classList.remove('show');
      document.getElementById('selectedCountryText').textContent = `${loc.city}, ${country}`;
      await fetchWeather(loc.lat, loc.lon, loc.city, country);
    }

    async function fetchWeather(lat, lon, city, country) {
      showLoading();
      currentLocation = { lat, lon, city, country };
      try {
        const tu = currentUnit === 'celsius' ? 'celsius' : 'fahrenheit';
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&temperature_unit=${tu}&wind_speed_unit=kmh&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();
        displayWeather(data, city, country);
        hideLoading();
      } catch {
        hideLoading();
        showError('Failed to fetch weather data. Please try again.');
      }
    }

    function displayWeather(data, city, country) {
      const c = data.current, d = data.daily;
      const unit = currentUnit === 'celsius' ? '°C' : '°F';
      const icon = WEATHER_ICONS[c.weather_code] || '🌡️';
      const desc = WEATHER_DESCRIPTIONS[c.weather_code] || 'Unknown';
      const precip = c.precipitation !== undefined ? c.precipitation : 0;

      const html = `
        <div class="location-header">
          <h1 class="location-name">${city}</h1>
          <p class="location-country">${country}</p>
        </div>
        <div class="current-weather">
          <div class="temp-main">
            <div class="weather-icon">${icon}</div>
            <div class="temp-value">${Math.round(c.temperature_2m)}${unit}</div>
          </div>
          <div class="weather-description">${desc}</div>
          <div class="weather-details">
            <div class="detail-item">
              <div class="detail-label">Feels Like</div>
              <div class="detail-value">${Math.round(c.apparent_temperature)}${unit}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Humidity</div>
              <div class="detail-value">${c.relative_humidity_2m}%</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value">${Math.round(c.wind_speed_10m)} km/h</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Precipitation</div>
              <div class="detail-value">${precip} mm</div>
            </div>
          </div>
        </div>
        <div class="forecast-section">
          <h2 class="forecast-title">7-Day Forecast</h2>
          <div class="forecast-grid">
            ${d.time.slice(0,7).map((date,i) => {
              const fi = WEATHER_ICONS[d.weather_code[i]] || '🌡️';
              const dn = new Date(date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
              const dp = d.precipitation_sum ? d.precipitation_sum[i] : 0;
              return `
                <div class="forecast-card">
                  <div class="forecast-date">${dn}</div>
                  <div class="forecast-icon">${fi}</div>
                  <div class="temp-range">
                    <span class="temp-high">${Math.round(d.temperature_2m_max[i])}${unit}</span>
                    <span>/</span>
                    <span class="temp-low">${Math.round(d.temperature_2m_min[i])}${unit}</span>
                  </div>
                  <div style="font-size:0.8rem;color:#64748b;margin-top:6px;">💧 ${dp} mm</div>
                </div>`;
            }).join('')}
          </div>
        </div>`;

      document.getElementById('weatherDisplay').innerHTML = html;
      document.getElementById('initialView').style.display = 'none';
      document.getElementById('weatherDisplay').classList.add('show');
      startWeatherEffects(c.weather_code);
    }

    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('initialView').style.display = 'none';
      document.getElementById('weatherDisplay').classList.remove('show');
    }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }
    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
      document.getElementById('initialView').style.display = 'block';
    }

    // ── Weather Effects Engine ──
    (function(){
      const fxCanvas = document.getElementById('weather-fx');
      const fxCtx = fxCanvas.getContext('2d');
      let FW, FH, fxParticles = [], fxType = null, fxRAF = null;

      function fxResize(){ FW = fxCanvas.width = window.innerWidth; FH = fxCanvas.height = window.innerHeight; }
      window.addEventListener('resize', fxResize); fxResize();

      function createRain(count){
        const p = [];
        for(let i=0;i<count;i++) p.push({
          x: Math.random()*FW, y: Math.random()*FH,
          len: Math.random()*18+10, speed: Math.random()*6+8,
          opacity: Math.random()*0.35+0.15, width: Math.random()*1.2+0.5
        });
        return p;
      }
      function drawRain(){
        fxCtx.clearRect(0,0,FW,FH);
        fxParticles.forEach(p=>{
          fxCtx.beginPath();
          fxCtx.moveTo(p.x, p.y);
          fxCtx.lineTo(p.x+1, p.y+p.len);
          fxCtx.strokeStyle = `rgba(130,180,255,${p.opacity})`;
          fxCtx.lineWidth = p.width;
          fxCtx.stroke();
          p.y += p.speed; p.x += 0.5;
          if(p.y > FH){ p.y = -p.len; p.x = Math.random()*FW; }
        });
        fxRAF = requestAnimationFrame(drawRain);
      }

      function createSnow(count){
        const p = [];
        for(let i=0;i<count;i++) p.push({
          x: Math.random()*FW, y: Math.random()*FH,
          r: Math.random()*3+1.5, speed: Math.random()*1.5+0.5,
          drift: Math.random()*1-0.5, opacity: Math.random()*0.6+0.3,
          wobble: Math.random()*Math.PI*2
        });
        return p;
      }
      function drawSnow(){
        fxCtx.clearRect(0,0,FW,FH);
        fxParticles.forEach(p=>{
          p.wobble += 0.01;
          fxCtx.beginPath();
          fxCtx.arc(p.x + Math.sin(p.wobble)*30, p.y, p.r, 0, Math.PI*2);
          fxCtx.fillStyle = `rgba(220,235,255,${p.opacity})`;
          fxCtx.fill();
          p.y += p.speed; p.x += p.drift;
          if(p.y > FH+10){ p.y = -10; p.x = Math.random()*FW; }
        });
        fxRAF = requestAnimationFrame(drawSnow);
      }

      function createFog(count){
        const p = [];
        for(let i=0;i<count;i++) p.push({
          x: Math.random()*FW*1.5 - FW*0.25, y: Math.random()*FH,
          w: Math.random()*300+200, h: Math.random()*80+40,
          speed: Math.random()*0.4+0.1, opacity: Math.random()*0.06+0.02
        });
        return p;
      }
      function drawFog(){
        fxCtx.clearRect(0,0,FW,FH);
        fxParticles.forEach(p=>{
          fxCtx.fillStyle = `rgba(180,200,220,${p.opacity})`;
          fxCtx.beginPath();
          fxCtx.ellipse(p.x, p.y, p.w, p.h, 0, 0, Math.PI*2);
          fxCtx.fill();
          p.x += p.speed;
          if(p.x - p.w > FW){ p.x = -p.w; }
        });
        fxRAF = requestAnimationFrame(drawFog);
      }

      function drawSunRays(){
        fxCtx.clearRect(0,0,FW,FH);
        const cx = FW - 100, cy = 80;
        const time = Date.now()*0.0005;
        for(let i=0;i<12;i++){
          const angle = (Math.PI*2/12)*i + time;
          const len = 200 + Math.sin(time*2+i)*40;
          fxCtx.beginPath();
          fxCtx.moveTo(cx, cy);
          fxCtx.lineTo(cx + Math.cos(angle)*len, cy + Math.sin(angle)*len);
          fxCtx.strokeStyle = `rgba(250,204,21,${0.04 + Math.sin(time+i)*0.02})`;
          fxCtx.lineWidth = 12;
          fxCtx.stroke();
        }
        fxRAF = requestAnimationFrame(drawSunRays);
      }

      let lightningInterval = null;
      function startLightning(){
        const overlay = document.getElementById('lightningOverlay');
        lightningInterval = setInterval(()=>{
          if(Math.random()>0.6){
            overlay.classList.add('flash');
            setTimeout(()=> overlay.classList.remove('flash'), 80);
            setTimeout(()=>{ overlay.classList.add('flash');
              setTimeout(()=> overlay.classList.remove('flash'), 60);
            }, 150);
          }
        }, 3000);
      }
      function stopLightning(){
        if(lightningInterval){ clearInterval(lightningInterval); lightningInterval=null; }
        document.getElementById('lightningOverlay').classList.remove('flash');
      }

      window.startWeatherEffects = function(code){
        if(fxRAF) cancelAnimationFrame(fxRAF);
        fxCtx.clearRect(0,0,FW,FH);
        fxParticles = [];
        stopLightning();
        document.getElementById('sunGlow').classList.remove('active');

        // Rain: 51-55, 61-65, 80-82
        if([51,53,55,61,63,65,80,81,82].includes(code)){
          fxParticles = createRain(code>=63?200:100);
          drawRain();
        }
        // Snow: 71-77, 85-86
        else if([71,73,75,77,85,86].includes(code)){
          fxParticles = createSnow(code>=75?150:80);
          drawSnow();
        }
        // Thunderstorm: 95-99
        else if([95,96,99].includes(code)){
          fxParticles = createRain(220);
          drawRain();
          startLightning();
        }
        // Fog: 45, 48
        else if([45,48].includes(code)){
          fxParticles = createFog(15);
          drawFog();
        }
        // Clear/Sunny: 0, 1
        else if([0,1].includes(code)){
          document.getElementById('sunGlow').classList.add('active');
          drawSunRays();
        }
        // Partly cloudy etc: no heavy FX, just keep particles
      };
    })();
  </script>
